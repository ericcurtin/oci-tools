[package]
name = "ociboot-init"
description = "Tiny initramfs binary that mounts ociboot deployments (dracut 90ociboot module)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
authors.workspace = true
publish = false

# External-dependency-light by design: this binary must build as a tiny
# static executable for the initramfs. Do not add clap/tracing/anyhow/
# oci-cli-common here; argument handling stays manual. Workspace *library*
# crates whose own dependency weight is just libc/rustix are fine -- the
# mount logic (0246) deliberately reuses the same shared oci-bls cmdline
# parser, oci-erofs fs-verity ioctls, and oci-mount loop/mount syscalls
# every other binary uses rather than duplicating any of them.
[dependencies]
oci-bls.workspace = true
oci-erofs.workspace = true
oci-mount.workspace = true

[build-dependencies]
oci-build-info.workspace = true

[lints]
workspace = true
