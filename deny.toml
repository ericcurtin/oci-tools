# cargo-deny configuration (checked in CI by the lint job).
# ci/guards.py adds the project-specific rules cargo-deny cannot express
# (bin->bin dependency ban, one-crate-per-capability, btrfs/zfs grep guard).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # bincode 2 (unmaintained upstream) is a fixed-format dependency of
    # imago's qcow2 support, inside the statically-linked libkrun crates
    # (ocivmm's VMM). ocivmm never opens qcow2 images at all (pet VM
    # rootfs is a plain directory over virtiofs), the crate pin bounds
    # it, and no safe upgrade exists per the advisory itself.
    { id = "RUSTSEC-2025-0141", reason = "bincode via imago via krun-devices; qcow2 path unused by ocivmm" },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    # webpki-roots' bundled Mozilla root certificate list (a data set, not
    # code); permissive, OSI-submitted.
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
# Semver duplicates bloat builds and hint at drift; keep this at deny and add
# targeted skips when the ecosystem forces a transient duplicate.
multiple-versions = "deny"
wildcards = "deny"
# Internal path dependencies (crates/*) carry no version; that is fine for
# private workspace members.
allow-wildcard-paths = true
skip = [
    # ring (pulled in by ureq's default rustls TLS backend) still depends on
    # older getrandom/windows-sys than the rest of the workspace (tempfile,
    # clap's terminal-detection stack); both are tiny, audited, and this is
    # exactly the "ecosystem forces a transient duplicate" case above.
    { crate = "getrandom@0.2.17", reason = "pulled in by ring (ureq's TLS backend); rest of the workspace is on 0.4" },
    { crate = "windows-sys@0.52.0", reason = "pulled in by ring (ureq's TLS backend); rest of the workspace is on 0.61" },
    # zbus (the systemd cgroup driver's D-Bus client) pulls in async-trait
    # and serde_repr, both of which depend on a newer syn than the rest of
    # the workspace's proc-macro crates (clap_derive, thiserror-impl, ...)
    # -- the same "ecosystem forces a transient duplicate" case as above.
    { crate = "syn@3.0.0", reason = "pulled in by zbus's own async-trait/serde_repr dependencies; rest of the workspace is on syn 2" },
    # petgraph (prost-build's own dependency-graph analysis, used by
    # oci-cri-types' build.rs) still depends on an older hashbrown than
    # indexmap (pulled in independently by h2/hyper, also part of the
    # tonic/tokio stack) -- the same "ecosystem forces a transient
    # duplicate" case as above.
    { crate = "hashbrown@0.15.5", reason = "pulled in by petgraph (prost-build's dependency-graph analysis); indexmap (h2/hyper) is on 0.17" },
    { crate = "foldhash@0.1.5", reason = "hashbrown 0.15's hasher (see hashbrown@0.15.5 above); hashbrown 0.17 is on foldhash 0.2" },
    # The statically-linked libkrun crates (ocivmm's VMM, pinned by
    # revision in the workspace Cargo.toml) lag the rest of the
    # ecosystem on a few small dependencies -- the same "ecosystem
    # forces a transient duplicate" case as above, bounded by the pin.
    { crate = "bitflags@1.3.2", reason = "krun-devices is on bitflags 1; the rest of the workspace is on 2" },
    { crate = "getrandom@0.3.4", reason = "krun-devices' rand 0.9 is on getrandom 0.3; the rest of the workspace is on 0.4" },
    { crate = "r-efi@5.3.0", reason = "getrandom 0.3's own EFI shim (see getrandom@0.3.4 above); getrandom 0.4 is on r-efi 6" },
    { crate = "vm-memory@0.17.1", reason = "krun-vmm is on vm-memory 0.17; krun-devices (via imago) is on 0.18" },
    { crate = "vmm-sys-util@0.14.0", reason = "krun-vmm is on vmm-sys-util 0.14; krun-devices is on 0.15" },
]
skip-tree = []
deny = [
    # Forbidden filesystems: never even link support crates for these.
    { crate = "btrfs", reason = "btrfs is forbidden in oci-tools (ext4/xfs/erofs only)" },
    { crate = "libbtrfs", reason = "btrfs is forbidden in oci-tools (ext4/xfs/erofs only)" },
    { crate = "zfs", reason = "zfs is forbidden in oci-tools (ext4/xfs/erofs only)" },
    { crate = "libzetta", reason = "zfs is forbidden in oci-tools (ext4/xfs/erofs only)" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# The one permitted git dependency: libkrun's own crates, statically
# linked into ocivmm (pinned to an exact revision in the workspace
# Cargo.toml; not published to crates.io). The fork carries one
# upstream-submitted x86_64 initrd-placement fix on top of master --
# see the workspace Cargo.toml's own comment.
allow-git = ["https://github.com/ericcurtin/libkrun"]
