name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned toolchain
        run: rustup toolchain install

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: lint-${{ runner.os }}-

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
        env:
          RUSTFLAGS: -D warnings

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

      - name: Project guards (forbidden fs, bin deps, capability dups)
        run: python3 ci/guards.py

  # 2 parallel VM jobs (x86_64 only): each boots the target distro as a
  # microVM -- created straight from the distro's own OCI image by this
  # repo's *own* `ocivmm` binary (dogfooded on every push/PR; its VMM
  # is libkrun's crates statically linked, nothing to install or load
  # at run time) -- and builds/tests the workspace natively inside it,
  # under the distro's *own* kernel and systemd (ocivmm provisions both
  # into the pet VM with the distro's own package manager at create
  # time, run as a container on the fresh rootfs).
  # Dramatically faster than the qemu+cloud-init harness this replaced:
  # a ~30-60MB OCI image pull (cached) instead of a ~700MB cloud image,
  # a direct-kernel boot into systemd (~1-2s) instead of
  # UEFI+cloud-init minutes, and virtiofs instead of ssh+tar for
  # source/artifact transfer. The pet VM's own rootfs (kernel,
  # packages, rustup, cargo target) persists across runs via the
  # vm-state cache below.
  #
  # x86_64 runners provide /dev/kvm, which libkrun requires (no TCG
  # fallback exists anymore -- ci/setup-host.sh fails clearly instead).
  #
  # aarch64 coverage is `native-test` below instead, not a third and
  # fourth cell here: GitHub's own aarch64 runners have no /dev/kvm at
  # all.
  vm-test:
    name: vm (${{ matrix.base }}, ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - base: centos-stream10
            arch: x86_64
            runs-on: ubuntu-24.04
            timeout: 90
          - base: ubuntu-26.04
            arch: x86_64
            runs-on: ubuntu-24.04
            timeout: 90
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: ${{ matrix.timeout }}
    steps:
      - uses: actions/checkout@v7

      # Cargo cache for the *host-side* release build of ocivmm itself
      # (the guest's own build cache lives inside the VM state below).
      - name: Cache cargo (host ocivmm build)
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ocivmm-host-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: ocivmm-host-${{ runner.os }}-

      # The packed pet-VM state (OCI image blobs + the VM rootfs with
      # everything ci/vm-ci.sh installed and built on previous runs).
      # The key ends in run_id so a fresh (warmer) state is saved after
      # every run; restore falls back to the newest matching prefix.
      - name: Restore VM state
        uses: actions/cache@v6
        with:
          path: ~/.cache/oci-tools-ci/vm-state.tar
          key: vmstate-v1-${{ matrix.base }}-${{ matrix.arch }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            vmstate-v1-${{ matrix.base }}-${{ matrix.arch }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}-
            vmstate-v1-${{ matrix.base }}-${{ matrix.arch }}-

      - name: Set up host (kvm, passt)
        run: ci/setup-host.sh

      - name: Install pinned toolchain
        run: rustup toolchain install

      - name: Build ocivmm (host side)
        run: cargo build --release --locked -p ocivmm

      - name: Build and test in VM (ocivmm)
        env:
          OCI_CI_BASE: ${{ matrix.base }}
          OCI_CI_ARCH: ${{ matrix.arch }}
        run: ci/run-in-vm.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.base }}-${{ matrix.arch }}
          path: artifacts/
          if-no-files-found: error

      # Only the centos-stream10 cell's own ci/vm-ci.sh ever produces
      # this (a real RPM-native distro, where ci/build-rpm.sh's own
      # OCI_RPM_VERIFY_INSTALL=1 -- a genuine rpm -i/--version/rpm -e
      # round trip, not just extract-and-run -- is both meaningful and
      # safe; see docs/design/0224/0225/0227).
      - name: Upload RPM package
        if: matrix.base == 'centos-stream10'
        uses: actions/upload-artifact@v7
        with:
          name: rpm-${{ matrix.base }}-${{ matrix.arch }}
          path: artifacts-rpm/
          if-no-files-found: error

  # Real aarch64 architecture coverage, without the nested-VM harness
  # `vm-test` uses for x86_64: builds and tests directly on GitHub's own
  # aarch64 runner (a real CPU, no TCG emulation, no /dev/kvm dependency
  # at all) rather than booting a second, inner guest VM this
  # architecture's own runners can't accelerate anyway. Trades per-distro
  # (centos-stream10/ubuntu-26.04) coverage on this architecture alone
  # for a fast, reliable run on real hardware; `vm-test` above still
  # covers both distros on x86_64.
  native-test:
    name: native (aarch64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: ci/vm-prepare.sh

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: native-aarch64-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: native-aarch64-

      - name: Build, test, and stage release binaries
        run: ci/native-ci.sh

      # DEB only (not RPM): this runner is genuinely dpkg-native
      # (whatever Ubuntu release `ubuntu-24.04-arm` ships), so a real
      # `dpkg -i`/`dpkg -r` round trip is meaningful here the same way
      # it already is on this project's own dpkg-native development
      # host (see docs/design/0217) -- unlike RPM (docs/design/0216),
      # which needs a real RPM-native runner (e.g. this project's own
      # existing CentOS Stream 10 VM harness above) to verify anything
      # beyond a bare `rpmbuild`, still a separate, later step.
      - name: Build and verify the DEB package
        run: ci/build-deb.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries-native-aarch64
          path: artifacts/
          if-no-files-found: error

      - name: Upload DEB package
        uses: actions/upload-artifact@v7
        with:
          name: deb-native-aarch64
          path: artifacts-deb/
          if-no-files-found: error
